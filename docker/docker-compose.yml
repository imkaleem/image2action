services:
  fuseki:
    build:
      context: .
      dockerfile: Dockerfile.fuseki
    container_name: fuseki-server
    ports:
      - "3030:3030"
    environment:
      - ADMIN_PASSWORD=admin

  jupyter:
    build:
      context: .
      dockerfile: Dockerfile.jupyter
    container_name: jupyter-lab
    ports:
      - "8888:8888"
    volumes:
      - ./:/workspace
    working_dir: /workspace

